<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>김철용 | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Pill Nav -->
  <nav class="site-nav" id="site-nav">
    <div class="nav-pill">
      <div class="nav-logo" id="nav-logo"></div>
      <div class="nav-links" id="nav-links"></div>
      <button class="nav-toggle" id="nav-toggle" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="nav-mobile" id="nav-mobile"></div>
  </nav>

  <main>

    <!-- HERO — centered title, rotating word, scroll corner-rounding -->
    <section class="hero" id="hero">
      <div class="hero-bg" id="hero-bg">
        <div class="hero-center">
          <h1 class="hero-title" id="hero-title"></h1>
          <p class="hero-sub" id="hero-sub"></p>
        </div>
      </div>
    </section>

    <!-- STICKY TEXT REVEAL — word-by-word color transition on scroll -->
    <section class="sticky-text-section" id="sticky-text">
      <div class="sticky-text-inner">
        <div class="sticky-text-content">
          <p class="sticky-text-paragraph" id="sticky-paragraph"></p>
        </div>
      </div>
    </section>

    <!-- TECH STACK — cards with scroll reveal -->
    <section class="section-tech" id="tech">
      <div class="container">
        <div class="section-label" id="tech-label"></div>
        <div class="tech-grid" id="tech-grid"></div>
      </div>
    </section>

    <!-- PROJECTS -->
    <section class="section-projects" id="projects">
      <div class="container">
        <div class="section-label" id="projects-label"></div>
        <div class="project-grid" id="project-grid"></div>
      </div>
    </section>

    <!-- TIMELINE (dark section, accordion) -->
    <section class="section-timeline" id="timeline">
      <div class="container">
        <h2 class="tl-heading" id="tl-heading"></h2>
        <p class="tl-subtext" id="tl-subtext"></p>
        <div class="accordion" id="accordion"></div>
      </div>
    </section>

    <!-- CONTACT -->
    <section class="section-contact" id="contact">
      <div class="container">
        <h2 class="contact-heading" id="contact-heading"></h2>
        <div class="contact-grid" id="contact-grid"></div>
      </div>
    </section>

  </main>

  <!-- FOOTER (dark) -->
  <footer class="site-footer">
    <div class="container">
      <p id="footer-text"></p>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
