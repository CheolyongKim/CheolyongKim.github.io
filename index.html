<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>김철용 | Portfolio</title>
  <meta name="description" content="김철용 — 개발자 포트폴리오 웹사이트">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="#" class="logo" id="header-logo"></a>
      <nav class="nav-links" id="header-nav"></nav>
      <button class="nav-toggle" id="nav-toggle" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>


  <main>

    <!-- ========== HERO (Set A) ========== -->
    <section id="hero" class="hero palette-a section-pad">
      <div class="container">
        <div class="hero-content">
          <span class="hero-tag reveal" data-hero="tag"></span>
          <h1 class="hero-title reveal" data-hero="title"></h1>
          <p class="hero-philosophy reveal" data-hero="philosophy"></p>
          <p class="hero-desc reveal" data-hero="description"></p>
          <div class="hero-contacts reveal" data-hero="contacts"></div>
          <button class="btn-cta reveal" data-hero="cta"></button>
        </div>
      </div>
    </section>


    <!-- ── bridge ── -->
    <div class="palette-bridge-a-to-b" aria-hidden="true"></div>


    <!-- ========== TECH STACK (Set B) ========== -->
    <section id="tech-stack" class="palette-b section-pad">
      <div class="container">
        <h2 class="section-title reveal" data-section="title"></h2>
        <div id="tech-grid" class="tech-grid"></div>
      </div>
    </section>


    <!-- ── bridge ── -->
    <div class="palette-bridge-b-to-a" aria-hidden="true"></div>


    <!-- ========== PROJECTS (Set A) ========== -->
    <section id="projects" class="palette-a section-pad">
      <div class="container">
        <h2 class="section-title reveal" data-section="title"></h2>
        <div id="project-grid" class="project-grid"></div>
      </div>
    </section>


    <!-- ── bridge ── -->
    <div class="palette-bridge-a-to-b" aria-hidden="true"></div>


    <!-- ========== TIMELINE (Set B) ========== -->
    <section id="timeline" class="palette-b section-pad">
      <div class="container">
        <h2 class="section-title reveal" data-section="title"></h2>
        <div id="timeline-container" class="timeline-container"></div>
      </div>
    </section>


    <!-- ── bridge ── -->
    <div class="palette-bridge-b-to-a" aria-hidden="true"></div>


    <!-- ========== DETAILS / Progressive Disclosure (Set A) ========== -->
    <section id="details" class="details-section palette-a">
      <div class="container">
        <h2 class="section-title" data-section="title"></h2>
        <div class="details-frame details-content"></div>
      </div>
    </section>

  </main>


  <!-- ========== FOOTER (Set B) ========== -->
  <footer class="palette-b">
    <div class="container site-footer">
      <p class="site-footer-text" id="footer-text"></p>
    </div>
  </footer>


  <!-- ========== MODAL ========== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <button class="modal-close" id="modal-close" aria-label="닫기">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <div id="modal-content"></div>
    </div>
  </div>


  <!-- Scripts: data first, then logic -->
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
